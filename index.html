<style>
body {
font-family: Arial;
background: linear-gradient(#0b3d2e, #021a13);
margin:0;
display:flex;
justify-content:center;
}

.app { max-width:420px; width:100%; color:white; }

.banner {
background:gold;
color:black;
text-align:center;
padding:12px;
font-weight:bold;
}

.tabs {
display:flex;
gap:6px;
padding:10px;
}

.tabs button {
flex:1;
background:#0d221b;
color:white;
border:none;
padding:10px;
border-radius:8px;
}

.box {
background:#102820;
margin:10px;
padding:14px;
border-radius:14px;
}

input, select {
padding:10px;
margin:6px 0;
width:100%;
border-radius:10px;
border:none;
}

button {
padding:12px;
background:gold;
border:none;
width:100%;
border-radius:10px;
margin-top:8px;
font-weight:bold;
}

.holes {
display:grid;
grid-template-columns: repeat(3,1fr);
gap:8px;
}

.holeBox {
background:#0d221b;
padding:8px;
border-radius:10px;
text-align:center;
font-size:12px;
}

.points { color:#7CFC00; font-size:11px; }

.totals {
background:#021a13;
padding:10px;
border-radius:10px;
margin-bottom:10px;
text-align:center;
}

/* ADMIN */
#adminModal {
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000dd;
}

.adminBox {
background:#102820;
margin:20px;
padding:20px;
border-radius:12px;
max-height:90%;
overflow:auto;
}

/* SCORE GRID */
.scoreGrid {
display:grid;
grid-template-columns: repeat(6,1fr);
gap:4px;
margin-top:10px;
}

.scoreCell {
padding:6px;
border-radius:6px;
text-align:center;
font-size:12px;
}

.birdie { background:#1e90ff; color:white; }
.par { background:#999; color:black; }
.bogey { background:#0044cc; color:white; }
.other { background:#222; }
</style>
</head>

<body>

<div class="app">

<div class="adminBox">

<div id="adminContent"></div>
<button onclick="closeAdmin()">Close</button>
</div>
</div>

function adminLogin(){

// 🔥 FULL ADMIN WITH SCORECARDS
async function loadAdmin(){

const { data } = await supabaseClient.from("scores").select("*");

adminContent.innerHTML="";

data.forEach(r=>{

let courseData=getCourseData(r.course);

let grid="<div class='scoreGrid'>";

r.scores.forEach((s,i)=>{

let diff=s-courseData.pars[i];
let cls="other";

if(diff===-1) cls="birdie";
else if(diff===0) cls="par";
else if(diff===1) cls="bogey";

grid+=`<div class="scoreCell ${cls}">${s||"-"}</div>`;
});

grid+="</div>";

let div=document.createElement("div");

div.innerHTML=`
<b>${r.name}</b> - ${r.course}<br>
Total: ${r.total}
${grid}
<button onclick="deleteScore('${r.id}')">Delete</button>
<hr>
`;

adminContent.appendChild(div);
});
}

function deleteScore(id){
supabaseClient.from("scores").delete().eq("id",id).then(()=>{
loadAdmin();
loadLeaderboard();
});
}

function closeAdmin(){
