<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rosapenna 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
font-family: Arial;
background: linear-gradient(#0b3d2e, #021a13);
margin:0;
display:flex;
justify-content:center;
}

.app { max-width:420px; width:100%; color:white; }

.banner {
background:gold;
color:black;
text-align:center;
padding:12px;
font-weight:bold;
}

.box {
background:#102820;
margin:10px;
padding:14px;
border-radius:14px;
}

input, select {
padding:10px;
margin:6px 0;
width:100%;
border-radius:10px;
border:none;
}

button {
padding:12px;
background:gold;
border:none;
width:100%;
border-radius:10px;
margin-top:8px;
font-weight:bold;
}

.holes {
display:grid;
grid-template-columns: repeat(3,1fr);
gap:8px;
}

.holeBox {
background:#0d221b;
padding:8px;
border-radius:10px;
text-align:center;
font-size:12px;
}

.points { color:#7CFC00; font-size:11px; }

.totals {
background:#021a13;
padding:10px;
border-radius:10px;
margin-bottom:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="app">

<div class="banner" onclick="window.open('https://revolut.me/daniel75yn')">
💸 Enter Wager (Revolut)
</div>

<div class="box">

<h3>Enter Round</h3>

<div class="totals" id="totals">
Total: 0 | Stableford: 0<br>
Front 9: 0 | Back 9: 0
</div>

<select id="day">
<option value="1">Day 1</option>
<option value="2">Day 2</option>
<option value="3">Day 3</option>
</select>

<select id="name">
<option>Con</option><option>Dan</option><option>Dave Mc</option>
<option>Graham</option><option>Joe</option><option>Karl</option>
<option>Liam</option><option>Louis</option><option>Mick</option>
<option>Morgan</option><option>Niallers</option><option>Patsy</option>
<option>Potdogg</option>
</select>

<select id="course">
<option>Sandy Hills</option>
<option>St Patrick's Links</option>
<option>Old Tom Morris</option>
</select>

<input id="hcp" type="number" placeholder="Handicap">

<input type="file" id="photo">

<div class="holes" id="holes"></div>

<button onclick="reviewScore()">Submit Round</button>
</div>

<div class="box">
<h3>🏆 Overall Leaderboard</h3>
<ul id="overall"></ul>
</div>

<div class="box">
<h3>Admin</h3>
<input id="adminPass" type="password">
<button onclick="adminLogin()">Login</button>
</div>

</div>

<script>
const supabaseClient = supabase.createClient(
"https://yhssrjvicbhualcbojhb.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inloc3NyanZpY2JodWFsY2JvamhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTA2MzYsImV4cCI6MjA5MTIyNjYzNn0.8ex8oZ_MlTVme9_1qsxfMh_T8WFl-MmkrugAoypNI1c"
);

let imageData=null;

document.getElementById("photo").addEventListener("change", e=>{
let reader=new FileReader();
reader.onload=x=>imageData=x.target.result;
reader.readAsDataURL(e.target.files[0]);
});

// COURSE DATA
function getCourseData(course){
if(course==="Sandy Hills"){
return {pars:[5,4,3,4,4,4,3,5,4,4,3,4,5,4,4,3,5,4],
index:[3,9,15,1,7,11,17,5,13,2,16,10,4,8,12,18,6,14]};
}
if(course==="St Patrick's Links"){
return {pars:[4,5,3,4,4,5,3,4,4,4,4,5,3,4,4,3,5,3],
index:[7,1,15,5,11,3,17,9,13,2,8,4,18,6,10,16,12,14]};
}
return {pars:[4,4,3,5,4,4,3,5,4,4,5,3,4,4,3,5,4,3],
index:[9,5,17,1,7,13,15,3,11,2,4,18,6,10,14,8,12,16]};
}

// RENDER HOLES
function renderHoles(){

let course=document.getElementById("course").value;
let data=getCourseData(course);
let hcp=parseInt(document.getElementById("hcp").value||0);

let div=document.getElementById("holes");
div.innerHTML="";

for(let i=0;i<18;i++){

let strokes=Math.floor(hcp/18);
if(data.index[i] <= (hcp % 18)) strokes++;

let box=document.createElement("div");
box.className="holeBox";

box.innerHTML=`
<div><b>Hole ${i+1}</b></div>
<div>Par ${data.pars[i]}</div>
<div>SI ${data.index[i]}</div>
<input type="number" id="h${i+1}">
<div class="points" id="pts${i+1}"></div>
`;

let input=box.querySelector("input");

input.oninput=()=>{

let score=parseInt(input.value);
if(!score) return;

let par=data.pars[i];
let net=score-strokes;
let diff=net-par;

// STABLEFORD
let pts=0;
if(diff<=-2) pts=4;
else if(diff===-1) pts=3;
else if(diff===0) pts=2;
else if(diff===1) pts=1;

document.getElementById("pts"+(i+1)).innerText=pts+" pts";

// COLOUR
if(score < par) input.style.color="red";
else if(score === par) input.style.color="white";
else input.style.color="#4da6ff";

// AUTO NEXT
if(i<17) document.getElementById("h"+(i+2)).focus();

updateTotals();
};

div.appendChild(box);
}
}

// TOTALS
function updateTotals(){

let course=document.getElementById("course").value;
let data=getCourseData(course);
let hcp=parseInt(document.getElementById("hcp").value||0);

let total=0, stable=0, front=0, back=0;

for(let i=0;i<18;i++){

let strokes=Math.floor(hcp/18);
if(data.index[i] <= (hcp % 18)) strokes++;

let val=parseInt(document.getElementById("h"+(i+1)).value||0);
if(!val) continue;

total+=val;

let net=val-strokes;
let diff=net-data.pars[i];

let pts=0;
if(diff<=-2) pts=4;
else if(diff===-1) pts=3;
else if(diff===0) pts=2;
else if(diff===1) pts=1;

stable+=pts;

if(i<9) front+=pts;
else back+=pts;
}

document.getElementById("totals").innerHTML=
`Total: ${total} | Stableford: ${stable}<br>
Front 9: ${front} | Back 9: ${back}`;
}

// INIT
document.getElementById("course").addEventListener("change",renderHoles);
document.getElementById("hcp").addEventListener("input",renderHoles);

renderHoles();
</script>

</body>
</html>
