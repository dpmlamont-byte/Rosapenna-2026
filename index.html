<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rosapenna 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
font-family: Arial;
background: linear-gradient(#0b3d2e, #021a13);
margin:0;
display:flex;
justify-content:center;
}

.app { max-width:420px; width:100%; color:white; }

.box {
background:#102820;
margin:10px;
padding:14px;
border-radius:14px;
}

button {
padding:10px;
background:gold;
border:none;
width:100%;
border-radius:10px;
margin-top:8px;
font-weight:bold;
}

#adminModal {
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000dd;
}

.adminBox {
background:#102820;
margin:20px;
padding:20px;
border-radius:12px;
max-height:90%;
overflow:auto;
}

.scoreGrid {
display:grid;
grid-template-columns: repeat(6,1fr);
gap:4px;
margin-top:10px;
}

.scoreCell {
padding:6px;
border-radius:6px;
text-align:center;
font-size:12px;
}

/* SCORE COLOURS */
.birdie { background:#1e90ff; color:white; }
.par { background:#999; color:black; }
.bogey { background:#0044cc; color:white; }
.other { background:#222; }
</style>
</head>

<body>

<div class="app">

<div class="box">
<h3>Admin</h3>
<input id="adminPass" type="password" placeholder="Password">
<button onclick="adminLogin()">Enter</button>
</div>

</div>

<!-- ADMIN MODAL -->
<div id="adminModal">
<div class="adminBox">
<h3>Admin Panel</h3>
<div id="adminContent"></div>
<button onclick="closeAdmin()">Close</button>
</div>
</div>

<script>

const { createClient } = supabase;

const supabaseClient = createClient(
"https://yhssrjvicbhualcbojhb.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inloc3NyanZpY2JodWFsY2JvamhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTA2MzYsImV4cCI6MjA5MTIyNjYzNn0.8ex8oZ_MlTVme9_1qsxfMh_T8WFl-MmkrugAoypNI1c"
);

// COURSE DATA
function getCourseData(course){
if(course==="Sandy Hills"){
return {pars:[5,4,3,4,4,4,3,5,4,4,3,4,5,4,4,3,5,4]};
}
if(course==="St Patrick's Links"){
return {pars:[4,5,3,4,4,5,3,4,4,4,4,5,3,4,4,3,5,3]};
}
return {pars:[4,4,3,5,4,4,3,5,4,4,5,3,4,4,3,5,4,3]};
}

// ADMIN LOGIN
function adminLogin(){
if(adminPass.value==="rosapenna123"){
loadAdmin();
adminModal.style.display="block";
}else alert("Wrong password");
}

// LOAD ADMIN
async function loadAdmin(){

const { data, error } = await supabaseClient
.from("scores")
.select("*");

if(error){
alert("Error: " + error.message);
return;
}

if(!data || data.length === 0){
adminContent.innerHTML = "<p>No scores found</p>";
return;
}

adminContent.innerHTML="";

data.forEach(r=>{

let courseData = getCourseData(r.course);

let grid = "<div class='scoreGrid'>";

r.scores.forEach((score, i)=>{

let par = courseData.pars[i];
let diff = score - par;

let cls = "other";

if(diff === -1) cls = "birdie";
else if(diff === 0) cls = "par";
else if(diff === 1) cls = "bogey";

grid += `<div class="scoreCell ${cls}">${score || "-"}</div>`;

});

grid += "</div>";

let div=document.createElement("div");

div.innerHTML=`
<b>${r.name}</b> - ${r.course}<br>
Total: ${r.total}
${grid}
<button onclick="deleteScore('${r.id}')">Delete</button>
<hr>
`;

adminContent.appendChild(div);

});
}

function closeAdmin(){
adminModal.style.display="none";
}

// DELETE
async function deleteScore(id){

const { data, error } = await supabaseClient
.from("scores")
.delete()
.eq("id", id)
.select();

if(error){
alert("Delete failed: " + error.message);
return;
}

if(!data || data.length === 0){
alert("Delete failed — ID issue");
return;
}

alert("Deleted ✅");
loadAdmin();
}

</script>

</body>
</html>
